<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>今日の献立なーに？</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#FDFAF5;--sur:#FFF;--dark:#1C1916;--muted:#8A8278;--bdr:rgba(28,25,22,0.1);--gold:#9A7B3C;--gl:#F7F0DC;--gd:#7A5E20;--sage:#5A7040;--sl:#EAF0DF;--plum:#50407A;--pl:#F0ECF5;--ruby:#7A2E38;--rl:#FAE8E8;--amb:#C49A30;--teal:#2A7A6A;--tl:#DFF2EE;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--dark);font-size:14px;min-height:100vh;}
.hdr{background:var(--bg);border-bottom:1px solid var(--bdr);padding:12px 16px 0;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.hdr-top h1{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;}
.hdr-top em{font-size:11px;color:var(--muted);font-family:'Cormorant Garamond',serif;font-style:italic;}
.badge{background:var(--sl);color:var(--sage);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.tab-bar{display:flex;}
.tb{flex:1;padding:8px 2px 7px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'Noto Sans JP',sans-serif;font-size:10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;touch-action:manipulation;transition:all .15s;}
.tb .ti{font-size:16px;}
.tb.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:700;}
.note-bar{background:var(--sl);padding:7px 14px;font-size:11px;color:var(--sage);display:flex;align-items:center;gap:5px;border-bottom:1px solid rgba(90,112,64,0.12);}
.fridge-top{padding:10px 14px 6px;display:flex;justify-content:space-between;align-items:center;}
.fridge-top h2{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;font-style:italic;}
.reset-btn{font-size:11px;color:var(--ruby);border:1px solid rgba(122,46,56,0.25);background:none;padding:4px 10px;border-radius:20px;cursor:pointer;touch-action:manipulation;}
.cat-tabs{display:flex;overflow-x:auto;padding:0 14px;scrollbar-width:none;border-bottom:1px solid var(--bdr);}
.cat-tabs::-webkit-scrollbar{display:none;}
.ct{flex-shrink:0;padding:7px 12px 5px;font-size:12px;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;}
.ct.on{color:var(--dark);border-bottom-color:var(--dark);font-weight:700;}
.ing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;padding:12px 14px 140px;}
.ic{background:var(--sur);border:1.5px solid var(--bdr);border-radius:12px;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative;user-select:none;min-height:84px;justify-content:center;transition:all .12s;touch-action:manipulation;}
.ic:active{transform:scale(0.92);}
.ic.on{background:var(--gl);border-color:var(--gold);}
.ie{font-size:24px;line-height:1;}
.in{font-size:10px;text-align:center;line-height:1.3;font-weight:500;}
.ichk{position:absolute;top:4px;right:4px;width:14px;height:14px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:900;}
.qc{display:flex;align-items:center;gap:3px;margin-top:3px;}
.qb{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--gold);background:#fff;color:var(--gold);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;touch-action:manipulation;}
.qb:active{background:var(--gold);color:#fff;}
.qn{font-size:11px;font-weight:700;color:var(--gold);min-width:20px;text-align:center;}
.gen-area{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--bdr);padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.gen-btn{width:100%;padding:14px;background:var(--dark);color:#F7F0DC;border:none;border-radius:12px;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-style:italic;touch-action:manipulation;transition:all .15s;}
.gen-btn:active{transform:scale(0.97);}
.gen-btn:disabled{background:#C0BAB0;cursor:not-allowed;}
.gen-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:5px;}
.quick-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.quick-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border:1.5px solid var(--bdr);border-radius:30px;background:transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--muted);transition:all .2s;touch-action:manipulation;}
.quick-btn.on{background:var(--gl);border-color:var(--gold);color:var(--gd);font-weight:700;}
.quick-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .2s;}
.quick-btn.on .quick-dot{background:var(--gold);}
.diet-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border:1.5px solid var(--bdr);border-radius:30px;background:transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--muted);transition:all .2s;touch-action:manipulation;}
.diet-btn.on{background:#E8F5E4;border-color:#5A7040;color:#3A6030;font-weight:700;}
.diet-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .2s;}
.diet-btn.on .diet-dot{background:#5A7040;}
.quick-count{font-size:10px;opacity:0.7;}
.menu-wrap{padding:12px 14px 100px;}
.sel-sum{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.sel-ttl{font-size:10px;color:var(--muted);margin-bottom:5px;}
.schips{display:flex;flex-wrap:wrap;gap:4px;}
.sc{background:var(--gl);color:var(--gd);font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:3px;}
.sc-q{background:var(--gold);color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700;}
.res-ttl{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:12px;font-style:italic;margin-top:14px;}
.mc{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;margin-bottom:12px;overflow:hidden;}
.mc-accent{height:3px;width:100%;}
.a-朝食{background:var(--amb);}.a-昼食{background:var(--sage);}.a-夕食{background:var(--plum);}
.mc-hdr{padding:12px 14px 10px;display:flex;align-items:flex-start;justify-content:space-between;}
.h-朝食{background:#FFFBF0;}.h-昼食{background:#F0F7E8;}.h-夕食{background:#EEEAF5;}
.mc-left{flex:1;min-width:0;}
.mbdg{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;color:#fff;display:inline-block;margin-bottom:5px;letter-spacing:0.3px;}
.b-朝食{background:var(--amb);}.b-昼食{background:var(--sage);}.b-夕食{background:var(--plum);}
.mname{font-family:'Noto Serif JP',serif;font-size:19px;font-weight:700;color:var(--dark);line-height:1.3;letter-spacing:0.3px;}
.fb{font-size:22px;border:none;background:none;cursor:pointer;padding:4px;touch-action:manipulation;line-height:1;flex-shrink:0;}
.mcb{padding:0 14px 14px;}
.mdsc{font-size:12px;color:#666;line-height:1.7;margin-bottom:8px;}
.cal-row-card{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.nut-cal{background:#FFF3E0;color:#C47020;font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
.diet-badge-card{background:#E8F5E4;color:#3A6030;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.nut-grid-card{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.nut-item-card{background:#F7F5F0;border-radius:8px;padding:8px 6px;text-align:center;}
.nut-val-card{font-size:15px;font-weight:700;}
.nut-lbl-card{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:0.3px;}
.nut-mini-bar{margin-top:5px;height:3px;background:rgba(0,0,0,0.08);border-radius:2px;overflow:hidden;}
.nut-mini-fill{height:100%;border-radius:2px;}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.chip{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;}
.cm{background:#F7F0DC;color:var(--gd);}
.cs{background:var(--sl);color:var(--sage);}
.ing-section{margin-bottom:10px;}
.ing-ttl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:6px;}
.ing-chips{display:flex;flex-wrap:wrap;gap:4px;}
.ing-chip{font-size:11px;background:#F5EFE8;border:1px solid rgba(154,123,60,0.18);color:#7A5E30;border-radius:6px;padding:3px 8px;white-space:nowrap;}
.card-divider{height:1px;background:var(--bdr);margin:8px 0 10px;}
.card-btn-row{display:flex;gap:6px;}
.btn-recipe{flex:1;padding:10px;background:var(--dark);color:#F7F0DC;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;}
.btn-fav-card{padding:10px 14px;border:1.5px solid var(--bdr);background:transparent;border-radius:10px;font-size:16px;cursor:pointer;touch-action:manipulation;}
/* legacy compat */
.nut-row{display:none;}
.nut-lbl{font-size:10px;color:var(--muted);}
.nut-bar-bg{height:6px;background:rgba(0,0,0,0.07);border-radius:3px;overflow:hidden;}
.nut-bar{height:100%;border-radius:3px;}
.nut-val{font-size:10px;font-weight:700;color:var(--dark);}
/* 1日合計栄養 */
.daily-nut{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.dn-ttl{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;font-style:italic;margin-bottom:10px;color:var(--dark);}
.dn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.dn-card{background:var(--bg);border-radius:10px;padding:10px 12px;text-align:center;}
.dn-num{font-size:22px;font-weight:700;line-height:1;}
.dn-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.dn-bar-wrap{margin-top:6px;}
.dn-bar-bg{width:100%;height:8px;background:rgba(0,0,0,0.07);border-radius:4px;overflow:hidden;margin-top:4px;}
.dn-bar{height:100%;border-radius:4px;}
.cal-c{color:#E8832A;}.pro-c{color:#3A7FBF;}.fat-c{color:#C45A5A;}.car-c{color:#5A9A5A;}
.rtog{background:none;border:1px solid var(--bdr);color:var(--muted);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:7px;touch-action:manipulation;display:none;}
.rsteps{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);}
.rsteps.open{display:block;}
.step{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start;}
.snum{width:18px;height:18px;border-radius:50%;background:var(--dark);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.stxt{font-size:11px;line-height:1.6;color:#333;}
.sblk{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.sbhdr{background:var(--sl);padding:9px 12px;}
.sbttl{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--sage);font-style:italic;}
.si{padding:10px 12px;border-bottom:1px solid var(--bdr);}
.si:last-child{border-bottom:none;}
.sirow{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.sn{font-size:13px;font-weight:700;color:var(--dark);}
.scat{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--muted);font-style:italic;}
.sdsc{font-size:11px;color:#555;margin-top:3px;line-height:1.6;}
.dbtn{width:100%;margin-top:8px;padding:11px;background:var(--rl);border:1px solid rgba(122,46,56,0.2);border-radius:12px;color:var(--ruby);font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation;}
.tip{background:var(--gl);border:1px solid rgba(154,123,60,0.2);border-radius:12px;padding:11px 13px;margin-bottom:10px;}
.tip-l{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--gd);margin-bottom:3px;font-style:italic;}
.tip-t{font-size:12px;color:var(--dark);line-height:1.7;}
.rtry{width:100%;padding:12px;background:transparent;border:1.5px solid var(--dark);border-radius:12px;color:var(--dark);font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;font-style:italic;cursor:pointer;margin-top:8px;touch-action:manipulation;}
.nomatch{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:20px;text-align:center;color:var(--muted);margin-bottom:10px;}
/* 買い物リスト */
.shop-wrap{padding:12px 14px 100px;}
.shop-ttl{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;font-style:italic;margin-bottom:4px;}
.shop-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.shop-empty{text-align:center;padding:48px 16px;color:var(--muted);}
.shop-empty .se-ico{font-size:40px;margin-bottom:12px;}
.shop-empty p{font-size:13px;line-height:1.7;}
.shop-cat-ttl{font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:0.05em;}
.shop-item{display:flex;align-items:center;gap:10px;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;touch-action:manipulation;}
.shop-item.done{opacity:0.45;}
.shop-cb{width:20px;height:20px;border:2px solid var(--bdr);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.shop-item.done .shop-cb{background:var(--sage);border-color:var(--sage);}
.shop-e{font-size:20px;}
.shop-n{font-size:13px;font-weight:500;flex:1;}
.shop-item.done .shop-n{text-decoration:line-through;color:var(--muted);}
.copy-btn{width:100%;margin-top:14px;padding:12px;background:var(--tl);border:1.5px solid var(--teal);border-radius:12px;color:var(--teal);font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;font-style:italic;cursor:pointer;touch-action:manipulation;}
.clear-btn{width:100%;margin-top:8px;padding:10px;background:transparent;border:1px solid var(--bdr);border-radius:12px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;}
/* favs */
.fwrap{padding:12px 14px 100px;}
.fttl{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;font-style:italic;margin-bottom:10px;}
.fcard{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:8px;}
.fi{flex:1;min-width:0;}
.fn{font-size:13px;font-weight:700;color:var(--dark);}
.fsub{font-size:10px;color:var(--muted);margin-top:2px;}
.fdsc{font-size:11px;color:#555;margin-top:4px;line-height:1.5;}
.xbtn{font-size:16px;border:none;background:none;cursor:pointer;color:var(--muted);padding:2px;flex-shrink:0;}
.empty{text-align:center;padding:36px 16px;color:var(--muted);}
.ei{font-size:36px;margin-bottom:10px;}
.divider{height:1px;background:var(--bdr);margin:16px 0;}
/* あと1つで作れる */
.near-block{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.near-hdr{background:#FFF3E8;padding:9px 12px;border-bottom:1px solid rgba(193,100,14,0.15);}
.near-ttl{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#C1640E;font-style:italic;}
.near-item{padding:10px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.near-item:last-child{border-bottom:none;}
.near-meal-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff;flex-shrink:0;}
.near-name{font-size:13px;font-weight:700;color:var(--dark);flex:1;}
.near-add{display:flex;align-items:center;gap:5px;background:#FFF3E8;border-radius:20px;padding:4px 10px;flex-shrink:0;}
.near-add-ico{font-size:16px;}
.near-add-txt{font-size:11px;font-weight:700;color:#C1640E;white-space:nowrap;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <h1>今日の献立なーに？</h1>
    <em>by AI Chef</em>
    <span class="badge">📴 オフライン</span>
  </div>
  <div class="tab-bar">
    <button class="tb on" id="tb-fridge" onclick="showTab('fridge')"><span class="ti">🥬</span>冷蔵庫</button>
    <button class="tb" id="tb-menu" onclick="showTab('menu')"><span class="ti">🍽️</span>献立</button>
    <button class="tb" id="tb-shop" onclick="showTab('shop')"><span class="ti">🛒</span>買い物</button>
    <button class="tb" id="tb-favs" onclick="showTab('favs')"><span class="ti">❤️</span>お気に入り</button>
  </div>
</div>
<div id="tab-fridge">
  <div class="note-bar">🧂 調味料は全部ある前提｜📴 完全オフライン・無料</div>
  <div class="fridge-top"><h2>冷蔵庫の中身</h2><button class="reset-btn" onclick="resetFridge()">🗑 リセット</button></div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="ing-grid" id="ingGrid"></div>
  <div class="gen-area">
    <button class="gen-btn" id="genBtn" onclick="generate()" disabled>✦ 献立を考える</button>
    <div class="quick-bar">
      <button class="quick-btn" id="quickBtn" onclick="toggleQuick()">
        <span class="quick-dot"></span>⚡ 時短モード<span class="quick-count" id="quickCount"></span>
      </button>
      <button class="diet-btn" id="dietBtn" onclick="toggleDiet()" style="margin-left:6px">
        <span class="diet-dot"></span>🥗 ダイエット<span class="quick-count" id="dietCount"></span>
      </button>
    </div>
    <p class="gen-hint" id="genHint">食材を1つ以上選んでください</p>
  </div>
</div>
<div id="tab-menu" style="display:none">
  <div class="menu-wrap">
    <div class="sel-sum"><div class="sel-ttl">選んだ食材</div><div class="schips" id="selChips"><span style="font-size:11px;color:var(--muted)">冷蔵庫タブで食材を選んでください</span></div></div>
    <button class="gen-btn" id="genBtn2" onclick="generate()" disabled style="margin-bottom:4px">✦ 献立を考える</button>
    <div class="quick-bar"><button class="quick-btn" id="quickBtn2" onclick="toggleQuick2()"><span class="quick-dot"></span>⚡ 時短モード<span class="quick-count" id="quickCount2"></span></button><button class="diet-btn" id="dietBtn2" onclick="toggleDiet2()" style="margin-left:6px"><span class="diet-dot"></span>🥗 ダイエット<span class="quick-count" id="dietCount2"></span></button></div>
    <div id="resultArea"></div>
  </div>
</div>
<div id="tab-shop" style="display:none">
  <div class="shop-wrap" id="shopWrap"></div>
</div>
<div id="tab-favs" style="display:none"><div class="fwrap" id="favsWrap"></div></div>

// ダイエット対象レシピ（1食400kcal以下）
const DIET_CALS={朝食:320,昼食:450,夕食:400};

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function matchR(ids,type){
  let candidates=RECIPES.filter(r=>r.t===type)
    .map(r=>({...r,rm:r.r.filter(x=>ids.includes(x)).length,om:(r.o||[]).filter(x=>ids.includes(x)).length}))
    .filter(r=>r.rm===r.r.length);
  if(quickMode)candidates=candidates.filter(r=>QUICK_IDS.has(r.id));
  if(dietMode)candidates=candidates.filter(r=>(r.nut?.cal||999)<=( DIET_CALS[type]||400));
  return shuffle(candidates);
}
function toggleQuick(){quickMode=!quickMode;syncQuickBtns();updateBtn();}
function toggleQuick2(){quickMode=!quickMode;syncQuickBtns();updateBtn();}
function syncQuickBtns(){
  ['quickBtn','quickBtn2'].forEach(id=>{
    const b=document.getElementById(id);if(b)b.classList.toggle('on',quickMode);
  });
  ['quickCount','quickCount2'].forEach(id=>{
    const c=document.getElementById(id);if(c)c.textContent=quickMode?' (ON)':'';
  });
}
function toggleDiet(){dietMode=!dietMode;syncDietBtns();updateBtn();}
function toggleDiet2(){dietMode=!dietMode;syncDietBtns();updateBtn();}
function syncDietBtns(){
  ['dietBtn','dietBtn2'].forEach(id=>{
    const b=document.getElementById(id);if(b)b.classList.toggle('on',dietMode);
  });
  ['dietCount','dietCount2'].forEach(id=>{
    const c=document.getElementById(id);if(c)c.textContent=dietMode?' (ON)':'';

function matchS(ids){
  return SAUCES.map(s=>({...s,ok:s.nd.length===0||s.nd.every(x=>ids.includes(x)),sc:(s.nd.length===0?50:80)+(s.op||[]).filter(x=>ids.includes(x)).length*10}))
    .filter(s=>s.ok).sort((a,b)=>b.sc-a.sc||Math.random()-0.5).slice(0,3);
}

function nearMiss(ids, pickedIds){
  // 必須食材が1個だけ足りないレシピを探す（すでに選ばれたレシピを除く）
  return RECIPES
    .filter(r=>!pickedIds.includes(r.id))
    .map(r=>{
      const missing=r.r.filter(x=>!ids.includes(x));
      const matched=r.r.filter(x=>ids.includes(x));
      return{...r,missing,matched};
    })
    .filter(r=>r.missing.length===1 && r.matched.length>=1)
    .sort((a,b)=>b.matched.length-a.matched.length||Math.random()-0.5);
}

function generate(){
  const ids=Object.keys(fridge);if(!ids.length)return;
  lastSnap=JSON.parse(JSON.stringify(fridge));
  const a=matchR(ids,'朝食'),b=matchR(ids,'昼食'),c=matchR(ids,'夕食'),s=matchS(ids);
  const picked=[a[0],b[0],c[0]].filter(Boolean);
  const pickedIds=picked.map(r=>r.id);
  // あと1つで作れるレシピ（朝昼夜から各1件まで、計最大6件）
  const nm=nearMiss(ids,pickedIds);
  const nmByType={朝食:[],昼食:[],夕食:[]};
  nm.forEach(r=>{if(nmByType[r.t]&&nmByType[r.t].length<2)nmByType[r.t].push(r);});
  const nearMissList=[...nmByType['朝食'],...nmByType['昼食'],...nmByType['夕食']];
  const tips=['旬の食材を積極的に使いましょう！','シンプルな調理法ほど素材の味が引き立ちます。','盛り付けに気を使うだけで食卓が華やかに。','下ごしらえをしっかりすると仕上がりが格段に違います。','食材を無駄なく使い切るのがプロの証。'];
  lastR={meals:picked,sauces:s,tip:tips[Math.floor(Math.random()*tips.length)],nm:['朝食','昼食','夕食'].filter(t=>!([a,b,c][['朝食','昼食','夕食'].indexOf(t)].length)),nearMiss:nearMissList};
  shopDone={};
  showTab('menu');renderResult(lastR);
}

  +`<button class="dbtn" onclick="deduct()">🗑 使った食材を冷蔵庫から差し引く</button>
  <button class="rtry" onclick="generate()">✦ 別の献立を提案してもらう</button>
  <button class="rtry" onclick="showTab('shop')" style="margin-top:8px;border-color:var(--teal);color:var(--teal)">🛒 買い物リストを見る</button>`;
}

// ─── 買い物リスト ───
function renderShop(){
  const w=document.getElementById('shopWrap');
  if(!lastR||!lastR.meals.length){
    w.innerHTML=`<div class="shop-ttl">🛒 買い物リスト</div><div class="shop-empty"><div class="se-ico">🛒</div><p>先に献立を生成してください。<br>不足している食材を自動でリストアップします！</p></div>`;
    return;
  }
  const fridgeIds=Object.keys(fridge);
  const needed={};
  lastR.meals.forEach(m=>{
    [...m.r,...(m.o||[])].forEach(id=>{
      if(!fridgeIds.includes(id)){
        const item=ALL_ITEMS.find(i=>i.id===id);
        if(item&&!needed[id])needed[id]={item,required:m.r.includes(id)};
      }
    });
  });

  const ids=Object.keys(needed);
  if(!ids.length){
    w.innerHTML=`<div class="shop-ttl">🛒 買い物リスト</div><div class="shop-empty"><div class="se-ico">✅</div><p>全ての食材が冷蔵庫にあります！<br>買い物不要です。</p></div>`;
    return;
  }

  // カテゴリ別に分類
  const bycat={};
  CATS.forEach(cat=>{
    const catItems=ids.filter(id=>cat.items.find(i=>i.id===id));
    if(catItems.length)bycat[cat.name]=catItems;
  });

  const doneCount=ids.filter(id=>shopDone[id]).length;
  let html=`<div class="shop-ttl">🛒 買い物リスト</div>
    <div class="shop-sub">${doneCount}/${ids.length}個 完了 — 今日の献立に必要な食材</div>`;

  Object.entries(bycat).forEach(([catName,catIds])=>{
    html+=`<div class="shop-cat-ttl">${catName}</div>`;
    catIds.forEach(id=>{
      const{item,required}=needed[id];
      const done=shopDone[id];
      html+=`<div class="shop-item ${done?'done':''}" onclick="toggleShop('${id}')">
        <div class="shop-cb">${done?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2" fill="none"/></svg>':''}</div>
        <span class="shop-e">${item.e}</span>
        <span class="shop-n">${item.n}${required?'<span style="color:var(--ruby);font-size:9px;margin-left:4px">必須</span>':''}</span>
      </div>`;
    });
  });

  html+=`<button class="copy-btn" onclick="copyShop()">📋 リストをコピー</button>
    <button class="clear-btn" onclick="clearShopDone()">チェックをリセット</button>`;
  w.innerHTML=html;
}

function toggleShop(id){
  shopDone[id]=!shopDone[id];renderShop();
}
function clearShopDone(){shopDone={};renderShop();}
function copyShop(){
  const fridgeIds=Object.keys(fridge);
  const needed={};
  lastR.meals.forEach(m=>{
    [...m.r,...(m.o||[])].forEach(id=>{
      if(!fridgeIds.includes(id)){const item=ALL_ITEMS.find(i=>i.id===id);if(item&&!needed[id])needed[id]={item,required:m.r.includes(id)};}
    });
  });
  const lines=['🛒 買い物リスト（今日の献立より）',''];
  CATS.forEach(cat=>{
    const catItems=Object.keys(needed).filter(id=>cat.items.find(i=>i.id===id));
    if(catItems.length){
      lines.push(cat.name);
      catItems.forEach(id=>{const{item}=needed[id];lines.push(`${shopDone[id]?'✅':'□'} ${item.e} ${item.n}`);});
      lines.push('');
    }
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('✅ コピーしました！')).catch(()=>alert('コピーに失敗しました'));
}

function tog(id,btnId,o,c){const el=document.getElementById(id);const btn=document.getElementById(btnId);if(!el||!btn)return;el.classList.toggle('open');btn.textContent=el.classList.contains('open')?c:o;}
function deduct(){if(!confirm('使った食材を差し引きますか？'))return;Object.keys(lastSnap).forEach(id=>{if(fridge[id]){fridge[id].qty=Math.max(0,Math.round((fridge[id].qty-lastSnap[id].qty)*10)/10);if(fridge[id].qty<=0)delete fridge[id];}});ls('fridge',fridge);alert('✅ 完了！');}
function tfm(i){const m=lastR&&lastR.meals[i];if(!m)return;const idx=favMeals.findIndex(f=>f.n===m.n);if(idx>=0)favMeals.splice(idx,1);else favMeals.push({...m,id:Date.now()});ls('favMeals',favMeals);const b=document.getElementById('fm'+i);if(b)b.textContent=favMeals.some(f=>f.n===m.n)?'❤️':'🤍';}
function tfs(i){const s=lastR&&lastR.sauces[i];if(!s)return;const idx=favSauces.findIndex(f=>f.n===s.n);if(idx>=0)favSauces.splice(idx,1);else favSauces.push({...s,id:Date.now()});ls('favSauces',favSauces);const b=document.getElementById('fs'+i);if(b)b.textContent=favSauces.some(f=>f.n===s.n)?'❤️':'🤍';}
function renderFavs(){
  const w=document.getElementById('favsWrap');
  const mh=favMeals.length?favMeals.map(m=>`<div class="fcard"><div class="fi"><div class="fn">${m.n}</div><div class="fsub">${m.t||''}</div><div class="fdsc">${m.d||''}</div></div><button class="xbtn" onclick="dfm(${m.id})">✕</button></div>`).join(''):`<div class="empty"><div class="ei">🤍</div><p>献立の🤍を押して保存</p></div>`;
  const sh=favSauces.length?favSauces.map(s=>`<div class="fcard"><div class="fi"><div class="fn">${s.n}</div><div class="fsub" style="font-style:italic">${s.cat||''}</div><div class="fdsc">${s.d||''}</div></div><button class="xbtn" onclick="dfs(${s.id})">✕</button></div>`).join(''):`<div class="empty"><div class="ei">🫙</div><p>ソースの🤍を押して保存</p></div>`;
  w.innerHTML=`<div class="fttl">✦ お気に入りの献立</div>${mh}<div class="divider"></div><div class="fttl">✦ お気に入りのソース</div>${sh}`;
}
function dfm(id){favMeals=favMeals.filter(f=>f.id!==id);ls('favMeals',favMeals);renderFavs();}
function dfs(id){favSauces=favSauces.filter(f=>f.id!==id);ls('favSauces',favSauces);renderFavs();}
init();
</script>
</body>
